<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Yoga | 优雅与力量的共鸣</title>
    <style>
        /* 引入优雅的字体 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Lato:wght@300;400&display=swap');

        :root {
            --bg-color: #FDFBF7;
            --text-main: #2C302E;
            --text-light: #6B706D;
            --accent-color: #586C5C;
            --font-serif: 'Noto Serif SC', serif;
            --font-sans: 'Lato', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-family: var(--font-serif);
            font-weight: 400;
        }

        /* 导航栏 */
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            font-family: var(--font-serif);
        }

        nav a {
            text-decoration: none;
            color: var(--text-light);
            margin-left: 2rem;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        /* Hero 视觉区 */
        .hero {
            display: flex;
            align-items: center;
            padding: 4rem 5%;
            min-height: 70vh;
            gap: 4rem;
        }

        .hero-text {
            flex: 1;
        }

        .hero-text h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .hero-text p {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            max-width: 400px;
        }

        .hero-image {
            flex: 1;
            height: 600px;
            overflow: hidden;
            border-radius: 4px 40px 4px 4px; /* 柔和的不对称圆角 */
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.95);
        }

        /* 模块通用样式 */
        .section-title {
            text-align: center;
            font-size: 2.2rem;
            margin: 6rem 0 3rem;
            color: var(--text-main);
        }

        /* 训练展示区 (CSS Grid) */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 0 5%;
        }

        .card {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 2rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            color: white;
        }

        .card-info h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        /* 服装展示区 */
        .apparel-section {
            background-color: #F4F1EA;
            padding: 4rem 5% 6rem;
            margin-top: 6rem;
        }

        .apparel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
        }

        .apparel-item {
            text-align: center;
        }

        .apparel-item img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }

        .apparel-item h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .apparel-item p {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* 底部 */
        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        /* 响应式适配 */
        @min-width: 768px {
            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 2rem;
            }
            .hero-text p {
                margin: 0 auto 2rem;
            }
            .apparel-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Lumina</div>
        <nav>
            <a href="#training">训练流</a>
            <a href="#apparel">呼吸感穿搭</a>
            <a href="#about">关于我们</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>向内探索，<br>感知身体的边界。</h1>
            <p>专注于呼吸与动作的连结。为您呈现欧美最前沿的瑜伽美学，探索力量与柔韧的完美平衡。</p>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1599901860904-17e6ed7083a0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Elegant Yoga Pose">
        </div>
    </section>

    <h2 class="section-title" id="training">觉知训练</h2>
    <section class="gallery">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Vinyasa Flow">
            <div class="card-info">
                <h3>Vinyasa 流瑜伽</h3>
                <p>如水般流动的力量</p>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Mindful Stretching">
            <div class="card-info">
                <h3>深层伸展</h3>
                <p>释放肌肉的深层记忆</p>
            </div>
        </div>
    </section>

    <div class="apparel-section" id="apparel">
        <h2 class="section-title" style="margin-top: 0;">第二层肌肤</h2>
        <section class="apparel-grid">
            <div class="apparel-item">
                <img src="https://images.unsplash.com/photo-1606902965551-dce093cda6a7?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Yoga Top">
                <h3>云感无缝运动内衣</h3>
                <p>高阶支撑 / 裸感体验</p>
            </div>
            <div class="apparel-item">
                <img src="https://images.unsplash.com/photo-1518611012118-696072aa579a?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Yoga Leggings">
                <h3>高腰立体塑形紧身裤</h3>
                <p>哑光质感 / 极致延展</p>
            </div>
            <div class="apparel-item">
                <img src="https://images.unsplash.com/photo-1620012253295-c159d25ab775?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Yoga Set">
                <h3>莫兰迪系列套装</h3>
                <p>从工作室到街头的从容</p>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Lumina Yoga Aesthetics. All Rights Reserved.</p>
    </footer>

</body>
</html>
